name: datus-data-engineering-airflow

# Minimal Airflow setup for the Datus data-engineering quickstart.
# Runs everything in a single container using Airflow's "standalone" mode
# (webserver + scheduler + triggerer combined).

services:
  airflow:
    image: apache/airflow:2.10.4
    environment:
      # DB — SQLite for local testing (standalone auto-selects SequentialExecutor)
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db

      # DAG behaviour
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"

      # REST API auth
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth

      # Speed up DAG discovery for tests
      AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL: "5"
      AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "0"

      # Web server
      AIRFLOW__WEBSERVER__SECRET_KEY: datus-test-secret-key

      # Auto-create admin user on first start
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
      _AIRFLOW_WWW_USER_ROLE: Admin
      # Preload the DuckDB connection used in the quickstart scheduler walkthrough.
      AIRFLOW_CONN_DUCKDB_DACOMP_LEVER: duckdb:////workspace/lever_workbench.duckdb

    volumes:
      # DAG files written by the adapter land here
      - ./dags:/opt/airflow/dags
      # Mount the local DAComp workspace so scheduled SQL jobs can reach the DuckDB file.
      - ${DACOMP_HOME:?Set DACOMP_HOME to the DAComp workspace path}:/workspace

    ports:
      - "8080:8080"

    command:
      - bash
      - -lc
      - >
        python -m pip install --no-cache-dir
        --constraint https://raw.githubusercontent.com/apache/airflow/constraints-2.10.4/constraints-3.12.txt
        "duckdb>=1.2.0,<2.0.0"
        "duckdb-engine>=0.17.0"
        &&
        exec airflow standalone

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s
