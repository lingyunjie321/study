# Local Superset environment for the Datus data-engineering quickstart.
# Usage:
#   docker compose up -d
#   docker compose logs -f superset   # wait for "Running on http://0.0.0.0:8088"
#   docker compose down -v

services:
  postgres:
    image: postgres:15
    container_name: datus-quickstart-superset-postgres
    environment:
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset_examples}
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:?Set SUPERSET_DB_PASSWORD}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  superset:
    image: apache/superset:${SUPERSET_IMAGE_TAG:-4.1.2}
    container_name: datus-quickstart-superset
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:?Set SUPERSET_SECRET_KEY}
      WTF_CSRF_ENABLED: "false"
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DB_NAME: ${SUPERSET_DB_NAME:-superset_examples}
      SUPERSET_DB_USER: ${SUPERSET_DB_USER:-superset}
      SUPERSET_DB_PASSWORD: ${SUPERSET_DB_PASSWORD:?Set SUPERSET_DB_PASSWORD}
      SQLALCHEMY_EXAMPLES_URI: "postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:?Set SUPERSET_DB_PASSWORD}@postgres:5432/${SUPERSET_DB_NAME:-superset_examples}"
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@example.com}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:?Set SUPERSET_ADMIN_PASSWORD}
    user: root
    volumes:
      - ./superset_config.py:/app/pythonpath/superset_config.py:ro
    ports:
      - "8088:8088"
    command: >
      bash -lc '
      python -m pip install --no-cache-dir psycopg2-binary -q &&
      superset db upgrade &&
      if ! superset fab list-users | grep -q "username:$$SUPERSET_ADMIN_USERNAME |"; then
        superset fab create-admin --username "$$SUPERSET_ADMIN_USERNAME" --firstname Admin --lastname User --email "$$SUPERSET_ADMIN_EMAIL" --password "$$SUPERSET_ADMIN_PASSWORD";
      fi &&
      superset init &&
      superset load-examples &&
      exec superset run -p 8088 -h 0.0.0.0 --with-threads
      '
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s
